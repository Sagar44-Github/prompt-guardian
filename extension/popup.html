<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ Prompt Guardian</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      width: 380px;
      background: linear-gradient(135deg, #07111F, #0F172A, #172554);
      color: #E2E8F0;
      padding: 18px;
    }

    /* Main Glass Card */
    .container {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.04);
    }

    /* Header */
    .header {
      margin-bottom: 22px;
    }

    .header h1 {
      font-size: 23px;
      font-weight: 700;
      color: #60A5FA;
      text-shadow: 0 0 12px rgba(96,165,250,0.25);
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      color: #94A3B8;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: linear-gradient(145deg, #172033, #1E293B);
      border-radius: 18px;
      padding: 15px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow:
        6px 6px 14px rgba(0,0,0,0.25),
        inset 0 1px 1px rgba(255,255,255,0.03);
      transition: 0.25s ease;
    }

    .stat-box:hover {
      transform: translateY(-4px);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #60A5FA;
    }

    .stat-number.red {
      color: #EF4444;
      text-shadow: 0 0 10px rgba(239,68,68,0.25);
    }

    .stat-number.green {
      color: #10B981;
      text-shadow: 0 0 10px rgba(16,185,129,0.25);
    }

    .stat-number.purple {
      color: #7C3AED;
      text-shadow: 0 0 10px rgba(124,58,237,0.25);
    }

    .stat-label {
      margin-top: 6px;
      font-size: 11px;
      color: #94A3B8;
      font-weight: 500;
    }

    /* Section Title */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #64748B;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    /* History Cards */
    #history {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 120px;
    }

    .entry {
      background: linear-gradient(145deg, #18253D, #1F2C45);
      border-radius: 16px;
      padding: 14px;
      border-left: 4px solid #334155;
      box-shadow:
        4px 4px 12px rgba(0,0,0,0.22),
        inset 0 1px 1px rgba(255,255,255,0.03);
    }

    .entry.danger {
      border-left-color: #EF4444;
    }

    .entry.warn {
      border-left-color: #F59E0B;
    }

    .entry.safe {
      border-left-color: #10B981;
    }

    .entry-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score {
      font-size: 13px;
      font-weight: 700;
    }

    .time {
      font-size: 10px;
      color: #64748B;
    }

    .prompt-snip {
      font-size: 12px;
      color: #B8C8DB;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Empty State */
    .empty-msg {
      text-align: center;
      padding: 28px 10px;
      background: linear-gradient(145deg, #18253D, #1F2C45);
      border-radius: 16px;
      font-size: 12px;
      color: #64748B;
      border: 1px dashed #334155;
    }

    /* Footer */
    .footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      font-size: 11px;
      color: #64748B;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10B981;
      box-shadow: 0 0 12px rgba(16,185,129,0.55);
      margin-right: 6px;
      vertical-align: middle;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>🛡️ Prompt Guardian</h1>
      <div class="subtitle">
        AI Prompt Injection Firewall
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">

      <div class="stat-box">
        <div class="stat-number" id="total">0</div>
        <div class="stat-label">Analyzed</div>
      </div>

      <div class="stat-box">
        <div class="stat-number red" id="blocked">0</div>
        <div class="stat-label">Blocked</div>
      </div>

      <div class="stat-box">
        <div class="stat-number green" id="safe">0</div>
        <div class="stat-label">Safe</div>
      </div>

      <div class="stat-box">
        <div class="stat-number purple" id="multilingual">0</div>
        <div class="stat-label">Multilingual</div>
      </div>

    </div>

    <!-- Recent Activity -->
    <div class="section-title">
      RECENT ACTIVITY
    </div>

    <div id="history">
      <div class="empty-msg">
        No recent prompts analyzed yet
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="status-dot"></span>
      Backend: localhost:5000
    </div>

  </div>

  <script src="popup.js"></script>

</body>
</html>
